<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="facsBg" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#7c2d12"/>
      <stop offset="100%" stop-color="#1c0804"/>
    </radialGradient>
    <radialGradient id="pop1Halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pop2Halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fb923c" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#fb923c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="dot1" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#fed7aa"/>
      <stop offset="60%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#c2410c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" fill="url(#facsBg)"/>

  <!-- Plot axes -->
  <line x1="28" y1="158" x2="184" y2="158" stroke="#f97316" stroke-width="1.3" stroke-opacity="0.65"/>
  <line x1="28" y1="18"  x2="28"  y2="158" stroke="#f97316" stroke-width="1.3" stroke-opacity="0.65"/>

  <!-- Axis arrow tips -->
  <polygon points="184,155 188,158 184,161" fill="#f97316" fill-opacity="0.65"/>
  <polygon points="25,18 28,14 31,18"       fill="#f97316" fill-opacity="0.65"/>

  <!-- Grid lines -->
  <line x1="28" y1="118" x2="184" y2="118" stroke="#f97316" stroke-width="0.4" stroke-opacity="0.18" stroke-dasharray="3,5"/>
  <line x1="28" y1="78"  x2="184" y2="78"  stroke="#f97316" stroke-width="0.4" stroke-opacity="0.18" stroke-dasharray="3,5"/>
  <line x1="28" y1="38"  x2="184" y2="38"  stroke="#f97316" stroke-width="0.4" stroke-opacity="0.18" stroke-dasharray="3,5"/>
  <line x1="76"  y1="18" x2="76"  y2="158" stroke="#f97316" stroke-width="0.4" stroke-opacity="0.18" stroke-dasharray="3,5"/>
  <line x1="124" y1="18" x2="124" y2="158" stroke="#f97316" stroke-width="0.4" stroke-opacity="0.18" stroke-dasharray="3,5"/>

  <!-- Axis ticks -->
  <line x1="76"  y1="158" x2="76"  y2="162" stroke="#f97316" stroke-width="0.9" stroke-opacity="0.5"/>
  <line x1="124" y1="158" x2="124" y2="162" stroke="#f97316" stroke-width="0.9" stroke-opacity="0.5"/>
  <line x1="172" y1="158" x2="172" y2="162" stroke="#f97316" stroke-width="0.9" stroke-opacity="0.5"/>
  <line x1="28" y1="118" x2="24" y2="118" stroke="#f97316" stroke-width="0.9" stroke-opacity="0.5"/>
  <line x1="28" y1="78"  x2="24" y2="78"  stroke="#f97316" stroke-width="0.9" stroke-opacity="0.5"/>
  <line x1="28" y1="38"  x2="24" y2="38"  stroke="#f97316" stroke-width="0.9" stroke-opacity="0.5"/>

  <!-- Population 1: Debris / small particles (lower-left, dim) -->
  <ellipse cx="58" cy="132" rx="22" ry="16" fill="url(#pop2Halo)"/>
  <circle cx="44"  cy="140" r="2.8" fill="#f97316" fill-opacity="0.28"/>
  <circle cx="52"  cy="133" r="3.2" fill="#f97316" fill-opacity="0.32"/>
  <circle cx="60"  cy="138" r="2.5" fill="#f97316" fill-opacity="0.28"/>
  <circle cx="65"  cy="127" r="3"   fill="#f97316" fill-opacity="0.3"/>
  <circle cx="48"  cy="122" r="2.2" fill="#f97316" fill-opacity="0.25"/>
  <circle cx="70"  cy="134" r="2.5" fill="#f97316" fill-opacity="0.26"/>
  <circle cx="56"  cy="118" r="2"   fill="#f97316" fill-opacity="0.23"/>
  <circle cx="42"  cy="128" r="1.8" fill="#f97316" fill-opacity="0.2"/>
  <circle cx="72"  cy="124" r="1.8" fill="#f97316" fill-opacity="0.22"/>
  <circle cx="58"  cy="145" r="1.5" fill="#f97316" fill-opacity="0.18"/>

  <!-- Population 2: EVs / particles of interest (upper-right, bright + gated) -->
  <!-- Glow -->
  <ellipse cx="136" cy="70" rx="42" ry="36" fill="url(#pop1Halo)"/>

  <!-- Gate rectangle -->
  <rect x="100" y="38" width="76" height="66" rx="5"
        stroke="#fb923c" stroke-width="1.8" fill="#f97316" fill-opacity="0.07"
        stroke-opacity="0.88" stroke-dasharray="5.5,3"/>

  <!-- Dense cluster of EV dots inside gate -->
  <circle cx="118" cy="76" r="4.2" fill="url(#dot1)" fill-opacity="0.85"/>
  <circle cx="130" cy="62" r="5"   fill="url(#dot1)" fill-opacity="0.9"/>
  <circle cx="142" cy="72" r="3.8" fill="#f97316" fill-opacity="0.8"/>
  <circle cx="124" cy="54" r="3.5" fill="#f97316" fill-opacity="0.75"/>
  <circle cx="150" cy="58" r="4.2" fill="url(#dot1)" fill-opacity="0.85"/>
  <circle cx="136" cy="84" r="3.2" fill="#f97316" fill-opacity="0.72"/>
  <circle cx="156" cy="74" r="3.8" fill="#f97316" fill-opacity="0.78"/>
  <circle cx="112" cy="64" r="3.2" fill="#f97316" fill-opacity="0.7"/>
  <circle cx="144" cy="48" r="3.2" fill="#f97316" fill-opacity="0.72"/>
  <circle cx="162" cy="65" r="2.8" fill="#f97316" fill-opacity="0.65"/>
  <circle cx="120" cy="88" r="2.5" fill="#f97316" fill-opacity="0.62"/>
  <circle cx="164" cy="82" r="2.2" fill="#f97316" fill-opacity="0.58"/>
  <circle cx="108" cy="82" r="2.5" fill="#f97316" fill-opacity="0.62"/>
  <circle cx="168" cy="52" r="2"   fill="#f97316" fill-opacity="0.55"/>
  <!-- Bright cores on selected dots -->
  <circle cx="130" cy="62" r="2"   fill="#fed7aa" fill-opacity="0.95"/>
  <circle cx="150" cy="58" r="1.8" fill="#fed7aa" fill-opacity="0.9"/>
  <circle cx="118" cy="76" r="1.5" fill="#fdba74" fill-opacity="0.9"/>

  <!-- Gate count badge -->
  <rect x="102" y="107" width="32" height="13" rx="3"
        fill="#f97316" fill-opacity="0.22" stroke="#fb923c"
        stroke-width="0.8" stroke-opacity="0.6"/>
  <circle cx="111" cy="113" r="1.5" fill="#fb923c" fill-opacity="0.9"/>
  <circle cx="117" cy="113" r="1.5" fill="#fb923c" fill-opacity="0.9"/>
  <circle cx="123" cy="113" r="1.5" fill="#fb923c" fill-opacity="0.9"/>
  <circle cx="129" cy="113" r="1.5" fill="#fb923c" fill-opacity="0.9"/>

  <!-- Scattered outlier events -->
  <circle cx="90"  cy="95"  r="1.8" fill="#f97316" fill-opacity="0.28"/>
  <circle cx="82"  cy="48"  r="1.6" fill="#f97316" fill-opacity="0.22"/>
  <circle cx="170" cy="112" r="1.5" fill="#f97316" fill-opacity="0.22"/>
  <circle cx="46"  cy="58"  r="1.5" fill="#f97316" fill-opacity="0.18"/>
  <circle cx="175" cy="42"  r="1.3" fill="#f97316" fill-opacity="0.18"/>
  <circle cx="100" cy="108" r="1.5" fill="#f97316" fill-opacity="0.24"/>
  <circle cx="36"  cy="100" r="1.2" fill="#f97316" fill-opacity="0.17"/>

  <!-- Axis labels text indicators (small lines as tick groups) -->
  <text x="24"  y="164" font-family="system-ui,sans-serif" font-size="8" fill="#f97316"
        fill-opacity="0.55" text-anchor="middle">FSC</text>
  <text x="14"  y="90"  font-family="system-ui,sans-serif" font-size="8" fill="#f97316"
        fill-opacity="0.55" text-anchor="middle" transform="rotate(-90 14 90)">SSC</text>

  <!-- Bottom separator -->
  <line x1="20" y1="176" x2="180" y2="176" stroke="#f97316" stroke-width="0.5" stroke-opacity="0.15"/>
</svg>
